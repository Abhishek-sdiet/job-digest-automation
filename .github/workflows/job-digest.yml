# .github/workflows/job-digest.yml
# =====================================================
# GitHub Actions Workflow
# Runs the job digest every morning at 7:00 AM IST
# (1:30 AM UTC = 7:00 AM IST)
# =====================================================

name: 🚀 Daily Job Digest

on:
  # Run every day at 7:00 AM IST (1:30 UTC)
  schedule:
    - cron: "30 1 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send test email with dummy data?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout your repo
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies
      - name: 📥 Install Dependencies
        run: npm ci

      # 4. Install Playwright Chromium (for company career pages)
      - name: 🌐 Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        continue-on-error: true  # Don't fail if Playwright install has issues

      # 5. Run the job digest
      - name: 🔍 Run Job Digest
        env:
          # Gmail credentials (stored as GitHub Secrets)
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}

          # Google Sheets (optional)
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}

          # Config
          MAX_JOBS_PER_EMAIL: 30
          LOOKBACK_HOURS: 24

        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "Running in TEST MODE..."
            node src/test-email.js
          else
            echo "Running full job digest..."
            node src/index.js
          fi

      # 6. On failure, create a GitHub issue to alert you
      - name: 🚨 Alert on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Job Digest Failed – ${new Date().toDateString()}`,
              body: `The daily job digest workflow failed.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'automation']
            })
